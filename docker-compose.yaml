services:
  web-tv-remote-control:
    container_name: web-tv-remote-control
    build:
      context: .
      dockerfile: Dockerfile
    devices:
      - /dev/uinput:/dev/uinput
    ports:
      - '8080:8080'
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - PUID=1000
      - PGID=1000
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
